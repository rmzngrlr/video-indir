<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #4A90E2;
            text-align: center;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        button:disabled {
            background-color: #a0c4e8;
            cursor: not-allowed;
        }
        .status {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
        }
        .success { color: #28a745; }
        .error { color: #d9534f; }
        .info { color: #007bff; }

        .settings-toggle {
            display: block;
            text-align: right;
            font-size: 11px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            margin-bottom: 10px;
        }
        #settingsPanel {
            display: none;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eee;
            margin-bottom: 10px;
        }

        progress {
            width: 100%;
            height: 15px;
            border-radius: 4px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <span class="settings-toggle" id="toggleSettingsBtn">Sunucu Ayarları (Server IP)</span>
    <div id="settingsPanel">
        <label>VidDown Sunucu URL'si</label>
        <input type="text" id="serverUrl" placeholder="Örn: http://95.179.150.145:3003" value="http://localhost:3003">
        <button id="saveSettingsBtn" style="padding: 5px; margin-top: 5px; font-size: 11px; background: #666;">Kaydet</button>
    </div>

    <h2>📱 VidDown İndirici</h2>

    <div class="form-group">
        <label>Video Linki</label>
        <input type="text" id="url" placeholder="Sayfadan otomatik çekiliyor...">
    </div>

    <div class="form-group">
        <label>Kalite Seçimi</label>
        <select id="resolution">
            <option value="best">Orijinal / En İyi</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="360">360p</option>
        </select>
    </div>

    <button id="downloadBtn">Şimdi İndir</button>

    <progress id="progressBar" value="0" max="100"></progress>
    <div id="statusMessage" class="status"></div>

    <script src="popup.js"></script>
</body>
</html>
