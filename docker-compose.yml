version: '3.8'

services:
  viddown:
    build: .
    container_name: viddown_app
    restart: unless-stopped
    ports:
      # Map host port 3003 to container port 8000
      - "3003:8000"
    volumes:
      # Mount the downloads directory to persist temporary files during processing
      - ./downloads:/app/downloads
      # Mount cookie files so they can be updated on the host without rebuilding the container
      - ./instagram_cookies.txt:/app/instagram_cookies.txt:ro
      - ./youtube_cookies.txt:/app/youtube_cookies.txt:ro
      - ./facebook_cookies.txt:/app/facebook_cookies.txt:ro
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      - TZ=UTC
